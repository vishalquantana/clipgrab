name: Build Windows .exe

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install pyinstaller pystray Pillow pyperclip yt-dlp

      - name: Build .exe
        run: |
          cd windows
          python build_exe.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipGrab-Windows
          path: windows/dist/ClipGrab.exe

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} windows/dist/ClipGrab.exe --clobber
